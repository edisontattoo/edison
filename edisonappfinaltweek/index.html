    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      @media print {
        /* Hide non-printable elements */
        .print-hidden, nav, footer {
          display: none !important;
        }

        /* Reset the body for a clean print page */
        body {
          background-color: #ffffff !important;
          color: #000000 !important;
          font-size: 11pt; /* A common font size for print */
        }

        /* Expand the main content area and add margins */
        main {
          padding: 0.75in !important; /* Standard print margins */
          margin: 0 !important;
          width: 100% !important;
          max-width: none !important;
        }
        
        /* Style the main card for printing */
        .printable-card {
            background-color: #ffffff !important;
            color: #000000 !important;
            box-shadow: none !important;
            border: none !important;
        }
        
        /* Ensure all text within the card is black for legibility */
        .printable-card *, .printable-card h2, .printable-card h3, .printable-card p, .printable-card dt, .printable-card dd {
            color: #000000 !important;
        }

        /* Style borders for print */
        .printable-card .print-border {
          border-color: #b0b0b0 !important; /* A light grey for print */
        }
        
        /* Style images within the card */
        .printable-card .printable-image {
          max-width: 250px !important;
          border: 1px solid #cccccc !important;
          background-color: #ffffff !important; /* For transparent images */
        }

        /* Fix grid layout for print by stacking items */
        .printable-card .print-layout-fix {
          display: block !important;
        }
      }
    </style>
